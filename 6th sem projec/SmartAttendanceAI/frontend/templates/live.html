<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Live Attendance – SmartAttendanceAI</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<div class="layout">

  <header class="topbar">
    <span class="topbar-title">🔴 Live Attendance Monitoring</span>
    <div class="topbar-right">
      <span class="topbar-badge" id="stream-status">🟡 Connecting…</span>
    </div>
  </header>

  <main class="main-content">
    <div class="live-container">

      <!-- Video Feed -->
      <div class="live-video-wrapper">
        <img id="live-canvas" src="" alt="Live camera feed"
             style="width:100%;height:100%;object-fit:cover;background:#0b0d0f"/>
        <div class="live-overlay">
          <span class="live-dot"></span>
          <span id="live-label" style="color:#e2e8f0;font-size:12px">AI Active</span>
        </div>
      </div>

      <!-- Recognition Feed -->
      <div>
        <div class="table-card">
          <div class="table-header">
            <span class="table-header-title">Recognised This Session</span>
            <span class="badge badge-teal" id="count-badge">0 students</span>
          </div>
          <div id="recognition-list" style="max-height:420px;overflow-y:auto;">
            <div style="padding:var(--space-8);text-align:center;color:var(--color-text-faint);">
              Waiting for detections…
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  const img    = document.getElementById('live-canvas');
  const status = document.getElementById('stream-status');
  const list   = document.getElementById('recognition-list');
  const cnt    = document.getElementById('count-badge');
  const seen   = new Set();

  const evtSource = new EventSource('/api/live_feed');

  evtSource.onopen = () => {
    status.textContent = '🟢 Streaming';
  };

  evtSource.onerror = () => {
    status.textContent = '🔴 Disconnected';
  };

  evtSource.onmessage = (e) => {
    const data = JSON.parse(e.data);

    // Update video frame
    if (data.frame) {
      img.src = 'data:image/jpeg;base64,' + data.frame;
    }

    // Update recognition list
    (data.detections || []).forEach(d => {
      if (d.student_id === 'UNKNOWN') return;
      if (seen.has(d.student_id)) return;
      seen.add(d.student_id);

      const row = document.createElement('div');
      row.style.cssText = `
        display:flex;align-items:center;justify-content:space-between;
        padding:12px 20px;border-bottom:1px solid var(--color-border);
      `;
      row.innerHTML = `
        <div>
          <div style="font-weight:600;font-size:14px">${d.name}</div>
          <div style="font-size:12px;color:var(--color-text-muted)">
            ${d.student_id} &nbsp;•&nbsp; ${d.mask} &nbsp;•&nbsp; ${d.liveness}
          </div>
        </div>
        <span class="badge badge-green">${d.confidence}% ✓</span>
      `;

      if (list.querySelector('div[style*="text-align"]')) list.innerHTML = '';
      list.prepend(row);
      cnt.textContent = seen.size + ' student' + (seen.size !== 1 ? 's' : '');
    });
  };
</script>
</body>
</html>
